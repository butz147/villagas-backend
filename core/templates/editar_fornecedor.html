{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Editar Fornecedor</h1>
    <a href="/fornecedores/" class="btn btn-secondary">Voltar</a>
</div>

{% for msg in messages %}
<div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
{% endfor %}

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-bottom:15px;">
            <div>
                <label>Nome *</label>
                <input type="text" name="nome" value="{{ fornecedor.nome }}" class="form-input" required>
            </div>
            <div>
                <label>CNPJ</label>
                <input type="text" name="cnpj" value="{{ fornecedor.cnpj }}" class="form-input">
            </div>
            <div>
                <label>Telefone</label>
                <input type="text" name="telefone" value="{{ fornecedor.telefone }}" class="form-input">
            </div>
            <div>
                <label>Email</label>
                <input type="email" name="email" value="{{ fornecedor.email }}" class="form-input">
            </div>
            <div>
                <label>Contato</label>
                <input type="text" name="contato" value="{{ fornecedor.contato }}" class="form-input">
            </div>
            <div>
                <label>Cidade</label>
                <input type="text" name="cidade" value="{{ fornecedor.cidade }}" class="form-input">
            </div>
            <div style="grid-column:1/-1;">
                <label>Endereço</label>
                <input type="text" name="endereco" value="{{ fornecedor.endereco }}" class="form-input">
            </div>
            <div style="grid-column:1/-1;">
                <label>Observações</label>
                <textarea name="observacoes" class="form-input" rows="2">{{ fornecedor.observacoes }}</textarea>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>
</div>
{% endblock %}
